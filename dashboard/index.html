                      <div className="schedule-card-title">${item.hook_text || item.content_type}</div>
                      <div className="schedule-card-meta">
                        <${StatusBadge} status=${item.status} />
                      </div>
                    </div>
                  `)}
                </div>
              `)}
            </${React.Fragment}>
          `)}
        </div>`}
      </div>`;
    }

    // ============================================================
    // PhotoUploader Component
    // ============================================================

    // Resize/re-encode an image client-side. iPhone photos are routinely 5\u201312MB;
    // shrinking to ~1920px JPEG cuts upload time on mobile data from ~40s to ~3s
    // and sidesteps HEIC rendering issues on Chrome (Safari can decode HEIC into
    // a canvas, so the encoded JPEG works everywhere).
    async function compressImage(file, { maxDim = 1920, quality = 0.85 } = {}) {
      const supportsBitmap = typeof createImageBitmap === 'function';
      let bitmap;
      try {
        bitmap = supportsBitmap
          ? await createImageBitmap(file, { imageOrientation: 'from-image' })
          : await loadViaImageEl(file);
      } catch {
        bitmap = await loadViaImageEl(file);
      }
      const w = bitmap.width;
      const h = bitmap.height;
      const scale = Math.min(1, maxDim / Math.max(w, h));
      const targetW = Math.round(w * scale);
      const targetH = Math.round(h * scale);

      const canvas = document.createElement('canvas');
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0, targetW, targetH);
      if (bitmap.close) bitmap.close();

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
      if (!blob) throw new Error('Image encoding failed');

      const baseName = (file.name || 'photo').replace(/\.[^.]+$/, '');
      return new File([blob], `${baseName}.jpg`, { type: 'image/jpeg' });
    }

    function loadViaImageEl(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not decode image')); };
        img.src = url;
      });
    }

    function uploadWithProgress(file, { onProgress, timeoutMs = 60000 } = {}) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        const fd = new FormData();
        fd.append('photo', file);
        xhr.open('POST', '/api/upload-photo');
        xhr.timeout = timeoutMs;
        xhr.upload.onprogress = e => {
          if (e.lengthComputable && onProgress) onProgress(Math.round((e.loaded / e.total) * 100));
        };
        xhr.onload = () => {
          let body;
          try { body = JSON.parse(xhr.responseText); } catch { body = null; }
          if (xhr.status >= 200 && xhr.status < 300 && body?.url) {
            resolve(body);
          } else {
            reject(new Error(body?.error || `Upload failed (HTTP ${xhr.status})`));
          }
        };
        xhr.onerror = () => reject(new Error('Network error during upload'));
        xhr.ontimeout = () => reject(new Error('Upload timed out \u2014 check your connection and try again'));
        xhr.onabort = () => reject(new Error('Upload aborted'));
        xhr.send(fd);
      });
    }

    function PhotoUploader({ label, url, onUploaded, onRemove, onToast }) {
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [stage, setStage] = useState('');
      const [dragOver, setDragOver] = useState(false);
      const inputRef = useRef(null);

      async function uploadFile(file) {
        if (!file) return;
        if (!file.type.startsWith('image/') && !/\.(heic|heif)$/i.test(file.name || '')) {
          onToast?.('Please select an image file', 'error');
          return;
        }

        setUploading(true);
        setProgress(0);
        setStage('Preparing...');
        try {
          let toUpload = file;
          if (file.size > 1.2 * 1024 * 1024) {
            try {
              toUpload = await compressImage(file);
            } catch (err) {
              // Fall back to original if compression fails (e.g. unsupported HEIC on Chrome)
              if (file.size > 14 * 1024 * 1024) {
                throw new Error('Image too large and could not be compressed in this browser');
              }
              toUpload = file;
            }
          }
          setStage('Uploading');
          const data = await uploadWithProgress(toUpload, {
            onProgress: (p) => {
              setProgress(p);
              // Once the body is fully on the wire we're waiting on the server's
              // push to Supabase Storage — call that out so 100% doesn't look stuck.
              if (p >= 100) setStage('Finalizing');
            },
            timeoutMs: 90000,
          });
          onUploaded(data.url);
        } catch (e) {
          console.error('Upload failed:', e);
          onToast?.(`Upload failed: ${e.message}`, 'error');
        } finally {
          setUploading(false);
          setProgress(0);
          setStage('');
          // Reset input so picking the same file again still triggers onChange
          if (inputRef.current) inputRef.current.value = '';
        }
      }

      function handleDrop(e) {
        e.preventDefault();
        setDragOver(false);
        const file = e.dataTransfer.files[0];
        if (file) uploadFile(file);
      }

      function handleFileChange(e) {
        const file = e.target.files[0];
        if (file) uploadFile(file);
      }

      const zoneClass = "photo-upload-zone"
        + (dragOver ? " drag-over" : "")
        + (url ? " has-image" : "")
        + (uploading ? " uploading" : "");

      return html`<div>
        <div className="photo-upload-label">${label}</div>
        <div
          className=${zoneClass}
          onClick=${() => !url && !uploading && inputRef.current?.click()}
          onDragOver=${e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave=${() => setDragOver(false)}
          onDrop=${handleDrop}
        >
          ${url ? html`
            <img className="photo-preview" src=${url} alt=${label} />
            <div className="photo-preview-info">
              <span className="photo-preview-name">${url.split('/').pop()}</span>
              <button type="button" className="photo-remove" onClick=${e => { e.stopPropagation(); onRemove(); }}>Remove</button>
            </div>
          ` : uploading ? html`
            <div className="spinner"></div>
            <div className="photo-upload-text">
              ${stage === 'Uploading' ? `Uploading ${progress}%` : stage === 'Finalizing' ? 'Finalizing…' : `${stage}…`}
            </div>
            ${stage === 'Uploading' || stage === 'Finalizing' ? html`
              <div className="photo-upload-progress"><div className="photo-upload-progress-bar" style=${{width: `${progress}%`}}></div></div>
            ` : null}
          ` : html`
            <div className="photo-upload-icon">\ud83d\uddbc\ufe0f</div>
            <div className="photo-upload-text">Drop image here or click to browse</div>
            <div className="photo-upload-hint">JPG, PNG, HEIC \u2022 auto-compressed</div>
          `}
          <input ref=${inputRef} type="file" accept="image/*,.heic,.heif" style=${{display: 'none'}} onChange=${handleFileChange} />
        </div>
      </div>`;
    }

    // ============================================================
    // AddContent Tab (multi-pair support)
    // ============================================================
    function AddContent({ onToast, onSwitch, seed, onSeedConsumed }) {
      const [subTab, setSubTab] = useState('reveal');
      const [submitting, setSubmitting] = useState(false);
      const [analyzing, setAnalyzing] = useState(false);
      const [generating, setGenerating] = useState(false);
      const [genHint, setGenHint] = useState('');
      const [genPairs, setGenPairs] = useState(1);
      const [genDamage, setGenDamage] = useState('');
      const [genTipHint, setGenTipHint] = useState('');
      const [genTipCount, setGenTipCount] = useState(4);
      const [genTip, setGenTip] = useState(false);
      const [genSource, setGenSource] = useState('curated');
      const [suggesting, setSuggesting] = useState(false);

      // Seed from "Generate similar", else auto-fill the active sub-tab's
      // suggestion fields from the curated pool when they're still empty.
      useEffect(() => {
        if (seed) {
          setSubTab(seed.type === 'tip' ? 'tip' : 'reveal');
          if (seed.type === 'tip') {
            setGenTipHint(seed.hint || '');
          } else {
            setGenHint(seed.hint || '');
            setGenDamage(seed.damageNotes || '');
          }
          setGenSource('manual');
          onSeedConsumed && onSeedConsumed();
          return;
        }
        if (subTab === 'reveal' && !genHint && !genDamage) {
          const s = suggestRevealInputs();
          setGenHint(s.hint); setGenDamage(s.damageNotes); setGenSource('curated');
        } else if (subTab === 'tip' && !genTipHint) {
          const s = suggestTipInputs();
          setGenTipHint(s.hint); setGenSource('curated');
        }
        // eslint-disable-next-line
      }, [subTab, seed]);

      function shuffleReveal() {
        const s = suggestRevealInputs({ hint: genHint, damageNotes: genDamage });
        setGenHint(s.hint); setGenDamage(s.damageNotes); setGenSource('curated');
      }
      function shuffleTip() {
        const s = suggestTipInputs({ hint: genTipHint });
        setGenTipHint(s.hint); setGenSource('curated');
      }
      async function aiSuggest(type) {
        setSuggesting(true);
        try {
          const r = await api('/api/suggest-generation-inputs', { method: 'POST', body: { type } });
          if (type === 'tip') {
            setGenTipHint(r.hint || '');
          } else {
            setGenHint(r.hint || ''); setGenDamage(r.damageNotes || '');
          }
          setGenSource('ai');
        } catch (e) {
          if (type === 'tip') shuffleTip(); else shuffleReveal();
          onToast('AI busy — used a curated suggestion', 'info');
        } finally {
          setSuggesting(false);
        }
      }

      async function handleGenerateTip() {
        setGenTip(true);
        try {
          onToast('Generating tips with AI — this can take a minute…', 'info');
          const result = await api('/api/generate-tip-content', {
            method: 'POST',
            body: { count: genTipCount, hint: genTipHint || undefined, source: genSource },
          });
          onToast('AI tip item created (' + result.tips.length + ' tips)!', 'success');
          onSwitch('pool');
        } catch (e) {
          onToast('AI tip generation failed: ' + e.message, 'error');
        } finally {
          setGenTip(false);
        }
      }

      function getNextSlot() {
        // Default new items to tomorrow at 06:00 local, as a datetime-local value.
        const d = new Date();
        d.setDate(d.getDate() + 1);
        d.setHours(6, 0, 0, 0);
        return toLocalInput(d.toISOString());
      }

      const emptyPair = () => ({ before_url: '', after_url: '', era: '', label: '' });

      const [pairs, setPairs] = useState([emptyPair()]);
      const [form, setForm] = useState({
        photo_story: '', preset_used: '', tip_title: '', tip_body: '',
        tip_source: '', scheduled_for: getNextSlot()
      });

      function update(field) {
        return e => setForm(f => ({ ...f, [field]: e.target.value }));
      }

      function updatePair(index, field, value) {
        setPairs(prev => prev.map((p, i) => i === index ? { ...p, [field]: value } : p));
      }

      function addPair() {
        if (pairs.length < 6) setPairs(prev => [...prev, emptyPair()]);
      }

      function removePair(index) {
        if (pairs.length > 1) setPairs(prev => prev.filter((_, i) => i !== index));
      }

      const firstPairReady = pairs[0].before_url && pairs[0].after_url;

      async function handleAnalyze(index) {
        const pair = pairs[index];
        if (!pair.before_url || !pair.after_url) return;
        setAnalyzing(true);
        try {
          const data = await api('/api/analyze-photos', {
            method: 'POST',
            body: { beforeUrl: pair.before_url, afterUrl: pair.after_url },
          });
          updatePair(index, 'era', data.photo_era || pair.era);
          setForm(f => ({
            ...f,
            photo_story: f.photo_story || data.photo_story || '',
            preset_used: f.preset_used || data.preset_used || '',
          }));
          onToast('AI auto-fill complete for pair ' + (index + 1), 'success');
        } catch (e) {
          onToast('Auto-fill failed: ' + e.message, 'error');
        } finally {
          setAnalyzing(false);
        }
      }

      async function handleGenerate() {
        setGenerating(true);
        try {
          onToast('Generating photos with AI — this can take a minute...', 'info');
          const result = await api('/api/generate-reveal-photos', {
            method: 'POST',
            body: { pairs: genPairs, hint: genHint || undefined, damageNotes: genDamage || undefined, source: genSource },
          });
          onToast('AI reveal created (' + result.imagePairs.length + ' pair' + (result.imagePairs.length !== 1 ? 's' : '') + ')!', 'success');
          onSwitch('pool');
        } catch (e) {
          onToast('AI generation failed: ' + e.message, 'error');
        } finally {
          setGenerating(false);
        }
      }

      async function handleSubmit(e) {
        e.preventDefault();
        setSubmitting(true);
        try {
          const body = { content_type: subTab, scheduled_for: fromLocalInput(form.scheduled_for) };
          if (subTab === 'reveal') {
            // Build image_pairs JSONB and legacy single-pair fields
            const imagePairs = pairs.filter(p => p.before_url && p.after_url);
            if (imagePairs.length === 0) {
              onToast('Add at least one before/after photo pair', 'error');
              setSubmitting(false);
              return;
            }
            Object.assign(body, {
              image_pairs: imagePairs,
              // Legacy fields from first pair for backwards compat
              before_image_url: imagePairs[0].before_url,
              after_image_url: imagePairs[0].after_url,
              photo_era: imagePairs[0].era || null,
              photo_story: form.photo_story,
              preset_used: form.preset_used || null,
            });
          } else {
            Object.assign(body, {
              tip_title: form.tip_title,
              tip_body: form.tip_body,
              tip_source: form.tip_source || null,
            });
          }
          await api('/api/content', { method: 'POST', body });
          onToast('Content added!', 'success');
          onSwitch('pool');
        } catch (e) { onToast(e.message, 'error'); }
        finally { setSubmitting(false); }
      }

      const eras = ['1940s', '1950s', '1960s', '1970s', '1980s', '1990s', '2000s', '2010s'];

      return html`<div>
        <div className="sub-tabs">
          <button className=${"sub-tab" + (subTab === 'reveal' ? " active-reveal" : "")} onClick=${() => setSubTab('reveal')}>\u2728 Reveal</button>
          <button className=${"sub-tab" + (subTab === 'tip' ? " active-tip" : "")} onClick=${() => setSubTab('tip')}>\ud83d\udca1 Tip</button>
        </div>

        <div className="panel" style=${{padding: '1.5rem'}}>
          <form onSubmit=${handleSubmit}>
            ${subTab === 'reveal' ? html`
              <div className="panel" style=${{padding: '1rem', marginBottom: '1.25rem', background: 'rgba(232,90,113,0.06)', border: '1px solid rgba(232,90,113,0.25)'}}>
                <div style=${{fontWeight: 600, marginBottom: '0.5rem'}}>✨ No photos? Generate a reveal with AI</div>
                <div style=${{fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '0.75rem'}}>
                  Invents an old family photo, ages it, then restores it — no upload needed. Creates a queued item.
                </div>
                <div style=${{display: 'flex', gap: '0.5rem', alignItems: 'flex-end', flexWrap: 'wrap'}}>
                  <div className="form-group" style=${{flex: '1 1 260px', margin: 0}}>
                    <label className="form-label">Theme / hint (optional)</label>
                    <input className="form-input" placeholder="e.g. Vietnamese wedding photos, 1960s soldiers" value=${genHint} onInput=${e => { setGenHint(e.target.value); setGenSource('manual'); }} />
                  </div>
                  <div className="form-group" style=${{flex: '1 1 220px', margin: 0}}>
                    <label className="form-label">Damage notes (optional)</label>
                    <input className="form-input" placeholder="e.g. heavy water damage, mildew, torn corners" value=${genDamage} onInput=${e => { setGenDamage(e.target.value); setGenSource('manual'); }} />
                  </div>
                  <div className="form-group" style=${{width: '90px', margin: 0}}>
                    <label className="form-label">Pairs</label>
                    <select className="form-select" value=${genPairs} onChange=${e => setGenPairs(Number(e.target.value))}>
                      ${[1,2,3,4,5,6].map(n => html`<option key=${n} value=${n}>${n}</option>`)}
                    </select>
                  </div>
                  <button type="button" className="btn btn-secondary btn-sm" title="Shuffle a curated suggestion" onClick=${shuffleReveal}>🎲</button>
                  <button type="button" className="btn btn-secondary btn-sm" title="Get a fresh AI suggestion" onClick=${() => aiSuggest('reveal')} disabled=${suggesting}>${suggesting ? '…' : '✨'}</button>
                  <button type="button" className="btn btn-teal btn-sm" style=${{whiteSpace: 'nowrap'}} onClick=${handleGenerate} disabled=${generating}>
                    ${generating ? 'Generating...' : '✨ Generate with AI'}
                  </button>
                </div>
              </div>
              <div className="pair-list">
                ${pairs.map((pair, i) => html`
                  <div className="pair-item" key=${i}>
                    <div className="pair-header">
                      <span className="pair-number">Photo Pair ${i + 1}${pairs.length > 1 ? ' of ' + pairs.length : ''}</span>
                      ${pairs.length > 1 ? html`<button type="button" className="pair-remove" onClick=${() => removePair(i)}>\u2715 Remove</button>` : null}
                    </div>
                    <div className="pair-photos">
                      <${PhotoUploader}
                        label="Before Photo"
                        url=${pair.before_url}
                        onUploaded=${url => updatePair(i, 'before_url', url)}
                        onRemove=${() => updatePair(i, 'before_url', '')}
                        onToast=${onToast}
                      />
                      <${PhotoUploader}
                        label="After Photo"
                        url=${pair.after_url}
                        onUploaded=${url => updatePair(i, 'after_url', url)}
                        onRemove=${() => updatePair(i, 'after_url', '')}
                        onToast=${onToast}
                      />
                    </div>
                    <div className="pair-era-row">
                      <div className="form-group">
                        <label className="form-label">Era</label>
                        <select className="form-select" value=${pair.era} onChange=${e => updatePair(i, 'era', e.target.value)}>
                          <option value="">Select era...</option>
                          ${eras.map(e => html`<option key=${e} value=${e}>${e}</option>`)}
                        </select>
                      </div>
                      <div className="form-group" style=${{display: 'flex', alignItems: 'flex-end'}}>
                        ${pair.before_url && pair.after_url ? html`
                          <button type="button" className="btn btn-teal btn-sm" onClick=${() => handleAnalyze(i)} disabled=${analyzing}>
                            ${analyzing ? 'Analyzing...' : '\u2728 AI Auto-fill'}
                          </button>
                        ` : null}
                      </div>
                    </div>
                  </div>
                `)}
              </div>
              <button type="button" className="add-pair-btn" onClick=${addPair} disabled=${pairs.length >= 6}>
                + Add Another Photo Pair${pairs.length >= 6 ? ' (max 6)' : ` (${pairs.length}/6)`}
              </button>

              <div className="form-grid">
                <div className="form-group">
                  <label className="form-label">Preset Used</label>
                  <input className="form-input" placeholder="e.g. vintage-colorize" value=${form.preset_used} onInput=${update('preset_used')} />
                </div>
                <div className="form-group">
                  <label className="form-label">Scheduled For</label>
                  <input className="form-input" type="datetime-local" value=${form.scheduled_for} onInput=${update('scheduled_for')} />
                </div>
                <div className="form-group full-width">
                  <label className="form-label">Photo Story</label>
                  <textarea className="form-textarea" placeholder="Brief context about the photos for AI script generation..." value=${form.photo_story} onInput=${update('photo_story')} required />
                </div>
              </div>
            ` : html`
              <div className="panel" style=${{padding: '1rem', marginBottom: '1.25rem', background: 'rgba(61,156,168,0.06)', border: '1px solid rgba(61,156,168,0.25)'}}>
                <div style=${{fontWeight: 600, marginBottom: '0.5rem'}}>✨ Generate a tip video with AI</div>
                <div style=${{fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '0.75rem'}}>
                  Invents several useful tips with matching background imagery. Creates a queued item.
                </div>
                <div style=${{display: 'flex', gap: '0.5rem', alignItems: 'flex-end', flexWrap: 'wrap'}}>
                  <div className="form-group" style=${{flex: '1 1 260px', margin: 0}}>
                    <label className="form-label">Topic / hint (optional)</label>
                    <input className="form-input" placeholder="e.g. scanning old prints, organizing photos" value=${genTipHint} onInput=${e => { setGenTipHint(e.target.value); setGenSource('manual'); }} />
                  </div>
                  <div className="form-group" style=${{width: '90px', margin: 0}}>
                    <label className="form-label">Tips</label>
                    <select className="form-select" value=${genTipCount} onChange=${e => setGenTipCount(Number(e.target.value))}>
                      ${[3,4,5,6].map(n => html`<option key=${n} value=${n}>${n}</option>`)}
                    </select>
                  </div>
                  <button type="button" className="btn btn-secondary btn-sm" title="Shuffle a curated suggestion" onClick=${shuffleTip}>🎲</button>
                  <button type="button" className="btn btn-secondary btn-sm" title="Get a fresh AI suggestion" onClick=${() => aiSuggest('tip')} disabled=${suggesting}>${suggesting ? '…' : '✨'}</button>
                  <button type="button" className="btn btn-teal btn-sm" style=${{whiteSpace: 'nowrap'}} onClick=${handleGenerateTip} disabled=${genTip}>
                    ${genTip ? 'Generating…' : '✨ Generate Tip with AI'}
                  </button>
                </div>
              </div>
              <div className="form-grid">
                <div className="form-group full-width">
                  <label className="form-label">Tip Title</label>
                  <input className="form-input" placeholder="e.g. Why AI faces look wrong in restored photos" value=${form.tip_title} onInput=${update('tip_title')} required />
                </div>
                <div className="form-group full-width">
                  <label className="form-label">Tip Body</label>
                  <textarea className="form-textarea" rows="4" placeholder="The main educational content..." value=${form.tip_body} onInput=${update('tip_body')} required />
                </div>
                <div className="form-group">
                  <label className="form-label">Source</label>
                  <input className="form-input" placeholder="e.g. EternalFrame autoresearch" value=${form.tip_source} onInput=${update('tip_source')} />
                </div>
                <div className="form-group">
                  <label className="form-label">Scheduled For</label>
                  <input className="form-input" type="datetime-local" value=${form.scheduled_for} onInput=${update('scheduled_for')} />
                </div>
              </div>
            `}
            <div style=${{marginTop: '1.5rem', display: 'flex', justifyContent: 'flex-end', gap: '0.75rem', alignItems: 'center'}}>
              ${subTab === 'reveal' && pairs.filter(p => p.before_url && p.after_url).length > 0 ? html`
                <span style=${{fontSize: '0.75rem', color: 'var(--text-muted)'}}>
                  ${pairs.filter(p => p.before_url && p.after_url).length} pair${pairs.filter(p => p.before_url && p.after_url).length !== 1 ? 's' : ''} \u2022 ~${Math.round(6.5 + pairs.filter(p => p.before_url && p.after_url).length * 8)}s video
                </span>
              ` : null}
              <button className="btn btn-primary" type="submit" disabled=${submitting}>
                ${submitting ? 'Adding...' : (subTab === 'reveal' ? '\u2728 Add Reveal' : '\ud83d\udca1 Add Tip')}
              </button>
            </div>
          </form>
        </div>
      </div>`;
    }

    // ============================================================
    // TikTok Re-auth Modal
    // ============================================================
    function ReauthModal({ onClose, onToast, onSuccess }) {
      const [authUrl, setAuthUrl] = useState('');
      const [callbackUrl, setCallbackUrl] = useState('');
      const [starting, setStarting] = useState(true);
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => {
        let cancelled = false;
        api('/api/tiktok/auth/start', { method: 'POST', body: {} })
          .then(({ authUrl }) => {
            if (cancelled) return;
            setAuthUrl(authUrl);
            window.open(authUrl, '_blank', 'noopener,noreferrer');
          })
          .catch(e => onToast(e.message, 'error'))
          .finally(() => { if (!cancelled) setStarting(false); });
        return () => { cancelled = true; };
      }, []);

      async function copyAuthUrl() {
        try {
          await navigator.clipboard.writeText(authUrl);
          onToast('Auth URL copied');
        } catch { onToast('Copy failed — select and copy manually', 'error'); }
      }

      async function handleSubmit() {
        if (!callbackUrl.trim()) {
          onToast('Paste the redirect URL from your browser', 'error');
          return;
        }
        setSubmitting(true);
        try {
          await api('/api/tiktok/auth/complete', { method: 'POST', body: { callbackUrl: callbackUrl.trim() } });
          onToast('TikTok re-authorized', 'success');
          onSuccess?.();
          onClose();
        } catch (e) { onToast(e.message, 'error'); }
        finally { setSubmitting(false); }
      }

      return html`<div className="modal-overlay" onClick=${onClose}>
        <div className="modal-content" style=${{maxWidth: '540px', width: '90%'}} onClick=${e => e.stopPropagation()}>
          <button className="modal-close" onClick=${onClose}>×</button>
          <div className="panel" style=${{padding: '1.25rem'}}>
            <div className="panel-header" style=${{padding: '0 0 0.75rem 0', border: 'none'}}>Re-authorize TikTok</div>
            ${starting ? html`
              <div style=${{display: 'flex', alignItems: 'center', gap: '0.5rem', color: 'var(--text-muted)', fontSize: '0.85rem'}}>
                <div className="spinner" style=${{width: '14px', height: '14px'}}></div>
                Generating authorization URL...
              </div>
            ` : html`
              <ol style=${{margin: '0 0 1rem', paddingLeft: '1.2rem', fontSize: '0.85rem', color: 'var(--text-light)', lineHeight: 1.6}}>
                <li>A new tab opened with TikTok's authorization page. Sign in and authorize.</li>
                <li>TikTok will redirect to a 404 page (expected) — copy the <strong>full URL</strong> from the address bar.</li>
                <li>Paste it below and tap Submit.</li>
              </ol>
              <div style=${{marginBottom: '1rem'}}>
                <div style=${{fontSize: '0.7rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.35rem'}}>Auth URL (if the new tab didn't open)</div>
                <div style=${{display: 'flex', gap: '0.5rem'}}>
                  <a href=${authUrl} target="_blank" rel="noopener noreferrer" style=${{flex: 1, fontSize: '0.7rem', fontFamily: 'JetBrains Mono', color: 'var(--amber)', wordBreak: 'break-all', padding: '0.5rem', background: 'rgba(255,255,255,0.04)', borderRadius: '6px', textDecoration: 'none'}}>${authUrl}</a>
                  <button className="btn btn-ghost btn-sm" onClick=${copyAuthUrl}>copy</button>
                </div>
              </div>
              <div className="form-group">
                <label style=${{fontSize: '0.7rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.05em'}}>Pasted redirect URL</label>
                <textarea
                  className="form-textarea"
                  style=${{minHeight: '90px', fontFamily: 'JetBrains Mono', fontSize: '0.7rem'}}
                  placeholder="https://eternalframe.app/auth/tiktok/callback?code=...&state=..."
                  value=${callbackUrl}
                  onChange=${e => setCallbackUrl(e.target.value)}
                  disabled=${submitting}
                />
              </div>
              <div style=${{display: 'flex', gap: '0.5rem', justifyContent: 'flex-end', marginTop: '1rem'}}>
                <button className="btn btn-ghost" onClick=${onClose} disabled=${submitting}>Cancel</button>
                <button className="btn btn-primary" onClick=${handleSubmit} disabled=${submitting || !callbackUrl.trim()}>
                  ${submitting ? html`<div className="spinner" style=${{width: '14px', height: '14px', borderTopColor: 'white'}}></div> Submitting...` : 'Submit'}
                </button>
              </div>
            `}
          </div>
        </div>
      </div>`;
    }

    // ============================================================
    // TikTok Auth Panel (rendered inside Pipeline tab)
    // ============================================================
    function TikTokAuthPanel({ onToast }) {
      const [status, setStatus] = useState(null);
      const [refreshing, setRefreshing] = useState(false);
      const [showReauth, setShowReauth] = useState(false);

      function loadStatus() {
        api('/api/tiktok/token-status').then(setStatus).catch(() => setStatus({ hasToken: false, isExpired: true }));
      }
      useEffect(loadStatus, []);

      async function handleRefresh() {
        setRefreshing(true);
        try {
          await api('/api/tiktok/refresh-token', { method: 'POST', body: {} });
          onToast('Token refreshed', 'success');
          loadStatus();
        } catch (e) { onToast(e.message, 'error'); }
        finally { setRefreshing(false); }
      }

      function formatExpiry(iso) {
        if (!iso) return '—';
        const ms = new Date(iso) - new Date();
        if (ms < 0) return `expired ${Math.round(-ms / 60000)} min ago`;
        if (ms < 3600_000) return `in ${Math.round(ms / 60000)} min`;
        if (ms < 86400_000) return `in ${Math.round(ms / 3600_000)}h`;
        return `in ${Math.round(ms / 86400_000)}d`;
      }

      const badge = !status ? null
        : !status.hasToken ? html`<span className="status-badge status-failed"><span className="led"></span>no token</span>`
        : status.isExpired ? html`<span className="status-badge status-failed"><span className="led"></span>expired</span>`
        : html`<span className="status-badge status-posted"><span className="led"></span>active</span>`;

      return html`<div className="panel" style=${{marginTop: '1.5rem'}}>
        <div className="panel-header">TikTok Account</div>
        <div style=${{padding: '1rem', display: 'flex', flexWrap: 'wrap', gap: '1rem', alignItems: 'center'}}>
          <div style=${{display: 'flex', flexDirection: 'column', gap: '0.35rem', flex: 1, minWidth: '200px'}}>
            <div style=${{display: 'flex', gap: '0.5rem', alignItems: 'center'}}>
              ${badge}
              <span style=${{fontSize: '0.75rem', color: 'var(--text-muted)'}}>
                ${status?.hasToken ? `expires ${formatExpiry(status.expiresAt)}` : ''}
              </span>
            </div>
            ${status?.scope ? html`<div style=${{fontSize: '0.65rem', color: 'var(--text-muted)', fontFamily: 'JetBrains Mono'}}>${status.scope}</div>` : null}
          </div>
          <div style=${{display: 'flex', gap: '0.5rem', flexWrap: 'wrap'}}>
            <button className="btn btn-secondary btn-sm" onClick=${handleRefresh} disabled=${refreshing || !status?.hasToken}>
              ${refreshing ? 'Refreshing...' : 'Refresh Token'}
            </button>
            <button className="btn btn-primary btn-sm" onClick=${() => setShowReauth(true)}>Re-authorize</button>
          </div>
        </div>
        ${showReauth ? html`<${ReauthModal}
          onClose=${() => setShowReauth(false)}
          onToast=${onToast}
          onSuccess=${loadStatus}
        />` : null}
      </div>`;
    }

    // ============================================================
    // Pipeline Tab
    // ============================================================
    function Pipeline({ onToast }) {
      const [stats, setStats] = useState([]);
      const [running, setRunning] = useState(false);
      const [output, setOutput] = useState('');
      const [dryRun, setDryRun] = useState(true);
      const [postOnly, setPostOnly] = useState(false);
      const [contentId, setContentId] = useState('');
      const [contentItems, setContentItems] = useState([]);
      const [history, setHistory] = useState([]);
      const [expandedRun, setExpandedRun] = useState(null);
      const termRef = useRef(null);

      useEffect(() => {
        api('/api/stats').then(setStats).catch(console.error);
        api('/api/pipeline/history').then(setHistory).catch(console.error);
        api('/api/content').then(items => setContentItems(items.filter(i => ['queued', 'scripted', 'rendering', 'rendered', 'posted', 'failed'].includes(i.status)))).catch(console.error);
        api('/api/pipeline/status').then(s => { setRunning(s.running); setOutput(s.output); });
      }, []);

      useEffect(() => {
        if (!running) return;
        const interval = setInterval(async () => {
          const s = await api('/api/pipeline/status');
          setOutput(s.output);
          setRunning(s.running);
          if (!s.running) {
            api('/api/stats').then(setStats);
            api('/api/pipeline/history').then(setHistory);
            api('/api/content').then(items => setContentItems(items.filter(i => ['queued', 'scripted', 'rendering', 'rendered', 'posted', 'failed'].includes(i.status)))).catch(console.error);
          }
        }, 2000);
        return () => clearInterval(interval);
      }, [running]);

      useEffect(() => {
        if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight;
      }, [output]);

      async function handleRun() {
        try {
          const body = { dryRun, postOnly, contentId: contentId.trim() || undefined };
          await api('/api/pipeline/run', { method: 'POST', body });
          setRunning(true);
          setOutput('');
          const flags = [dryRun && 'dry run', postOnly && 'post only'].filter(Boolean).join(', ');
          onToast('Pipeline started' + (flags ? ` (${flags})` : ''), 'success');
        } catch (e) { onToast(e.message, 'error'); }
      }

      async function handleDeleteRun(id) {
        if (!confirm('Delete this run from history?')) return;
        try {
          await api('/api/pipeline/history/' + id, { method: 'DELETE' });
          onToast('Run deleted', 'success');
          api('/api/pipeline/history').then(setHistory);
        } catch (e) { onToast(e.message, 'error'); }
      }

      // Aggregate stats by status
      const statusTotals = {};
      stats.forEach(s => {
        statusTotals[s.status] = (statusTotals[s.status] || 0) + Number(s.count);
      });

      function formatDuration(start, end) {
        if (!start || !end) return '\u2014';
        const ms = new Date(end) - new Date(start);
        if (ms < 60000) return Math.round(ms / 1000) + 's';
        return Math.round(ms / 60000) + 'm ' + Math.round((ms % 60000) / 1000) + 's';
      }

      function formatTime(iso) {
        if (!iso) return '\u2014';
        return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      }

      return html`<div>
        <div className="stats-grid">
          ${['queued', 'scripted', 'rendering', 'rendered', 'posted', 'failed'].map(status => html`
            <div key=${status} className=${"stat-card stat-" + status}>
              <div className="stat-count">${statusTotals[status] || 0}</div>
              <div className="stat-label">${status}</div>
            </div>
          `)}
        </div>

        <div className="pipeline-controls">
          <button className="btn btn-primary" onClick=${handleRun} disabled=${running}>
            ${running ? html`<div className="spinner" style=${{width:'14px',height:'14px',borderTopColor:'white'}}></div> Running...` : '\u25b6 Run Pipeline'}
          </button>
          <div className="toggle-row">
            <button className=${"toggle" + (dryRun ? " on" : "")} onClick=${() => setDryRun(!dryRun)} />
            <span className="toggle-label">Dry Run</span>
          </div>
          <div className="toggle-row">
            <button className=${"toggle" + (postOnly ? " on" : "")} onClick=${() => setPostOnly(!postOnly)} />
            <span className="toggle-label">Post Only</span>
          </div>
          <select
            className="pipeline-id-input"
            value=${contentId}
            onChange=${e => setContentId(e.target.value)}
            style=${{width: '320px', appearance: 'auto'}}
          >
            <option value="">Next queued (auto)</option>
            ${contentItems.map(i => html`<option key=${i.id} value=${i.id}>${i.status === 'failed' ? '\u26a0 ' : ''}${i.status === 'posted' ? '\u21bb ' : ''}${i.id.slice(0, 8)} \u2022 ${i.content_type} \u2022 ${i.status}${i.hook_text ? ' \u2022 ' + i.hook_text.slice(0, 30) : ''}</option>`)}
          </select>
        </div>

        <div className="terminal">
          <div className="terminal-header">
            <div className="terminal-dot" style=${{background: running ? 'var(--green)' : 'var(--text-muted)'}}></div>
            <span style=${{fontFamily: 'JetBrains Mono', fontSize: '0.7rem', color: 'var(--text-muted)'}}>pipeline output</span>
          </div>
          <div className="terminal-body" ref=${termRef}>
            ${output || 'Waiting for pipeline run...\n'}
            ${running ? html`<span className="terminal-cursor"></span>` : null}
          </div>
        </div>

        <div className="panel" style=${{marginTop: '1.5rem'}}>
          <div className="panel-header">Run History</div>
          <table className="data-table history-table-desktop">
            <thead>
              <tr>
                <th>Time</th>
                <th>Content</th>
                <th>Mode</th>
                <th>Duration</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${history.length === 0 ? html`
                <tr><td colSpan="6" style=${{textAlign: 'center', padding: '2rem', color: 'var(--text-muted)'}}>No runs yet</td></tr>
              ` : null}
              ${history.map(run => html`
                <${React.Fragment} key=${run.id}>
                  <tr>
                    <td className="date-cell">${formatTime(run.started_at)}</td>
                    <td className="id-cell">${run.content_id ? run.content_id.slice(0, 8) : '\u2014'}</td>
                    <td>${run.dry_run ? html`<span style=${{color: 'var(--amber)', fontSize: '0.75rem'}}>dry</span>` : html`<span style=${{color: 'var(--teal)', fontSize: '0.75rem'}}>live</span>`}</td>
                    <td className="duration">${formatDuration(run.started_at, run.finished_at)}</td>
                    <td>
                      ${run.success === null ? html`<${StatusBadge} status="rendering" />`
                        : run.success ? html`<span className="status-badge status-posted"><span className="led"></span>success</span>`
                        : html`<span className="status-badge status-failed"><span className="led"></span>failed</span>`
                      }
                    </td>
                    <td style=${{whiteSpace: 'nowrap'}}>
                      ${run.output ? html`<button className="expand-btn" onClick=${() => setExpandedRun(expandedRun === run.id ? null : run.id)}>${expandedRun === run.id ? 'hide' : 'show log'}</button>` : null}
                      <button className="btn btn-ghost btn-sm btn-danger" style=${{marginLeft: run.output ? '0.5rem' : 0}} onClick=${() => handleDeleteRun(run.id)} title="Delete run">✕</button>
                    </td>
                  </tr>
                  ${expandedRun === run.id ? html`
                    <tr><td colSpan="6" style=${{padding: '0 1rem 1rem'}}>
                      <div className="history-output">${run.output}</div>
                    </td></tr>
                  ` : null}
                </${React.Fragment}>
              `)}
            </tbody>
          </table>
          <div className="history-cards-mobile">
            ${history.length === 0 ? html`
              <div style=${{textAlign: 'center', padding: '1.5rem', color: 'var(--text-muted)'}}>No runs yet</div>
            ` : null}
            ${history.map(run => html`
              <div className="history-card" key=${run.id}>
                <div className="history-card-header">
                  ${run.success === null ? html`<${StatusBadge} status="rendering" />`
                    : run.success ? html`<span className="status-badge status-posted"><span className="led"></span>success</span>`
                    : html`<span className="status-badge status-failed"><span className="led"></span>failed</span>`
                  }
                  <span className="duration">${formatDuration(run.started_at, run.finished_at)}</span>
                </div>
                <div className="history-card-meta">
                  <span>${formatTime(run.started_at)}</span>
                  <span>${run.dry_run ? 'dry' : 'live'}</span>
                  ${run.content_id ? html`<span>${run.content_id.slice(0, 8)}</span>` : null}
                </div>
                ${run.output ? html`
                  <button className="expand-btn" style=${{marginTop: '0.5rem'}} onClick=${() => setExpandedRun(expandedRun === run.id ? null : run.id)}>
                    ${expandedRun === run.id ? 'hide log' : 'show log'}
                  </button>
                  ${expandedRun === run.id ? html`<div className="history-output">${run.output}</div>` : null}
                ` : null}
                <div style=${{marginTop: '0.5rem', display: 'flex', justifyContent: 'flex-end'}}>
                  <button className="btn btn-ghost btn-sm btn-danger" onClick=${() => handleDeleteRun(run.id)} title="Delete run">✕</button>
                </div>
              </div>
            `)}
          </div>
        </div>

        <${TikTokAuthPanel} onToast=${onToast} />
      </div>`;
    }

    // ============================================================
    // App
    // ============================================================
    function App() {
      const [tab, setTab] = useState('pool');
      const [genSeed, setGenSeed] = useState(null);
      const [toasts, setToasts] = useState([]);
      const [contentCount, setContentCount] = useState(0);

      function dismissToast(id) {
        setToasts(prev => prev.filter(t => t.id !== id));
      }

      function addToast(message, type = 'success') {
        const id = ++toastId;
        setToasts(prev => [...prev, { id, message, type }]);
        // Errors stay visible long enough to read on mobile and are
        // tap-dismissible; successes auto-clear after the existing 3s.
        const ttl = type === 'error' ? 10000 : 3000;
        setTimeout(() => dismissToast(id), ttl);
      }

      useEffect(() => {
        api('/api/content').then(data => setContentCount(data.length)).catch(() => {});
      }, [tab]);

      return html`<div className="app-shell">
        <${ToastContainer} toasts=${toasts} onDismiss=${dismissToast} />

        <div className="top-bar">
          <div className="logo">
            <div className="logo-icon"><img src="/static/eternalframe-logo.jpg" alt="EternalFrame" /></div>
            <div>
              <div className="logo-text">EternalFrame</div>
              <div className="logo-subtitle">TikTok Engine</div>
            </div>
          </div>
          <div className="live-indicator">
            <div className=${"live-dot" + (tab === 'pipeline' ? '' : ' idle')}></div>
            Dashboard
          </div>
        </div>

        <div>
          <div className="tab-nav">
            <button className=${"tab-btn" + (tab === 'pool' ? ' active' : '')} onClick=${() => setTab('pool')}>
              Content Pool<span className="tab-count">${contentCount}</span>
            </button>
            <button className=${"tab-btn" + (tab === 'schedule' ? ' active' : '')} onClick=${() => setTab('schedule')}>Schedule</button>
            <button className=${"tab-btn" + (tab === 'add' ? ' active' : '')} onClick=${() => setTab('add')}>Add Content</button>
            <button className=${"tab-btn" + (tab === 'pipeline' ? ' active' : '')} onClick=${() => setTab('pipeline')}>Pipeline</button>
          </div>

          <div className="tab-content">
            ${tab === 'pool' ? html`<${ContentPool} onToast=${addToast} onGenerateSimilar=${(s) => { setGenSeed(s); setTab('add'); }} />` : null}
            ${tab === 'schedule' ? html`<${Schedule} onToast=${addToast} />` : null}
            ${tab === 'add' ? html`<${AddContent} onToast=${addToast} onSwitch=${setTab} seed=${genSeed} onSeedConsumed=${() => setGenSeed(null)} />` : null}
            ${tab === 'pipeline' ? html`<${Pipeline} onToast=${addToast} />` : null}
          </div>
        </div>

        <nav className="bottom-nav">
          <button className=${"bottom-nav-item" + (tab === 'pool' ? ' active' : '')} onClick=${() => setTab('pool')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
            </svg>
            Pool
          </button>
          <button className=${"bottom-nav-item" + (tab === 'schedule' ? ' active' : '')} onClick=${() => setTab('schedule')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            Schedule
          </button>
          <button className=${"bottom-nav-item" + (tab === 'add' ? ' active' : '')} onClick=${() => setTab('add')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="16"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            Add
          </button>
          <button className=${"bottom-nav-item" + (tab === 'pipeline' ? ' active' : '')} onClick=${() => setTab('pipeline')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            Pipeline
          </button>
        </nav>
      </div>`;
    }

    // Mount
    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
